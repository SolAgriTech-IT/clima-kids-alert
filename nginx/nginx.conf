# Nginx reverse proxy for CLIMA-KIDS ALERT
#
# TLS: use `nginx/conf.d/50-https.conf` (see `nginx/conf.d/50-https.conf.example`) and mount
# host certificates (typically `/etc/letsencrypt`) via `docker-compose.ssl.yml`.
# HTTP → HTTPS redirect + ACME challenges: see `docs/TLS_NGINX_VPS.md`.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    include /etc/nginx/conf.d/*.conf;
}
